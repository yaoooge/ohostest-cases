<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#C7000A" />
    </marker>
  </defs>

  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF" />
    <rect x="0" y="0" width="1280" height="116" fill="#F7F7F7" />
    <rect x="0" y="0" width="9" height="720" fill="#C7000A" />
  </g>

  <g id="header">
    <path fill="#C7000A" d="M58,42 H58 A4,4 0 0 1 62,46 V82 A4,4 0 0 1 58,86 H58 A4,4 0 0 1 54,82 V46 A4,4 0 0 1 58,42 Z" />
    <text x="78" y="70" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="38" font-weight="800" fill="#1D1D1A">评测闭环：题目可信，Agent 真修好</text>
    <text x="80" y="99" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#666666">同一套 task / patch / test 组合，</text>
    <text x="306" y="99" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#666666">在不同阶段验证题目、基线、产物和实现方式</text>
  </g>

  <g id="takeaway">
    <path fill="#FFF4F5" stroke="#E9002F" stroke-width="1.2" d="M68,132 H1206 A8,8 0 0 1 1214,140 V178 A8,8 0 0 1 1206,186 H68 A8,8 0 0 1 60,178 V140 A8,8 0 0 1 68,132 Z" />
    <text x="86" y="166" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="21" font-weight="800" fill="#C7000A">核心判断：</text>
    <text x="194" y="154" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="19" fill="#1D1D1A">先证明题目和测试自身可靠，再验证 Agent 修改是否通过测试，</text>
    <text x="194" y="180" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="19" fill="#1D1D1A">最后审查实现是否符合预期。</text>
  </g>

  <g id="pipeline">
    <line x1="184" y1="350" x2="1096" y2="350" stroke="#C7000A" stroke-width="4" marker-end="url(#arrowRed)" />

    <g id="stage-1">
      <path fill="#FFFFFF" stroke="#EBEBEB" stroke-width="1.4" d="M68,224 H260 A8,8 0 0 1 268,232 V496 A8,8 0 0 1 260,504 H68 A8,8 0 0 1 60,496 V232 A8,8 0 0 1 68,224 Z" />
      <path fill="#C7000A" d="M68,224 H260 A8,8 0 0 1 268,232 V266 A8,8 0 0 1 260,274 H68 A8,8 0 0 1 60,266 V232 A8,8 0 0 1 68,224 Z" />
      <text x="82" y="256" font-family="Consolas, Courier New, monospace" font-size="17" font-weight="800" fill="#FFFFFF">01</text>
      <text x="122" y="256" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">验证 Golden</text>
      <text x="84" y="310" font-family="Consolas, Courier New, monospace" font-size="15" fill="#232323">task</text>
      <text x="84" y="334" font-family="Consolas, Courier New, monospace" font-size="15" fill="#232323">+ golden_patch</text>
      <text x="84" y="358" font-family="Consolas, Courier New, monospace" font-size="15" fill="#232323">+ test_patch</text>
      <line x1="84" y1="384" x2="244" y2="384" stroke="#EBEBEB" stroke-width="1" />
      
  <g transform="translate(84.0, 408.0) scale(0.9166666666666666)" fill="none" stroke="#2E7D32" stroke-width="2">
    <path d="M5 12l5 5l10 -10" />
  </g>
      <text x="116" y="425" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="700" fill="#2E7D32">全部单测通过</text>
      <text x="84" y="462" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#666666">证明参考答案与测试集匹配</text>
    </g>

    <g id="stage-2">
      <path fill="#FFFFFF" stroke="#EBEBEB" stroke-width="1.4" d="M308,224 H500 A8,8 0 0 1 508,232 V496 A8,8 0 0 1 500,504 H308 A8,8 0 0 1 300,496 V232 A8,8 0 0 1 308,224 Z" />
      <path fill="#F26B43" d="M308,224 H500 A8,8 0 0 1 508,232 V266 A8,8 0 0 1 500,274 H308 A8,8 0 0 1 300,266 V232 A8,8 0 0 1 308,224 Z" />
      <text x="322" y="256" font-family="Consolas, Courier New, monospace" font-size="17" font-weight="800" fill="#FFFFFF">02</text>
      <text x="362" y="256" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">验证 Baseline</text>
      <text x="324" y="310" font-family="Consolas, Courier New, monospace" font-size="15" fill="#232323">task</text>
      <text x="324" y="334" font-family="Consolas, Courier New, monospace" font-size="15" fill="#232323">+ test_patch</text>
      <line x1="324" y1="384" x2="484" y2="384" stroke="#EBEBEB" stroke-width="1" />
      
  <g transform="translate(324.0, 408.0) scale(0.9166666666666666)" fill="none" stroke="#E9002F" stroke-width="2">
    <path d="M12 9v4" />
    <path d="M10.363 3.591l-8.106 13.534a1.914 1.914 0 0 0 1.636 2.871h16.214a1.914 1.914 0 0 0 1.636 -2.87l-8.106 -13.536a1.914 1.914 0 0 0 -3.274 0" />
    <path d="M12 16h.01" />
  </g>
      <text x="356" y="425" font-family="Consolas, Courier New, monospace" font-size="15" font-weight="800" fill="#E9002F">fail_to_pass</text>
      <text x="324" y="462" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#666666">应失败并暴露待修复问题</text>
      <text x="324" y="486" font-family="Consolas, Courier New, monospace" font-size="14" fill="#2E7D32">pass_to_pass 成功</text>
    </g>

    <g id="stage-3">
      <path fill="#FFFFFF" stroke="#EBEBEB" stroke-width="1.4" d="M548,224 H740 A8,8 0 0 1 748,232 V496 A8,8 0 0 1 740,504 H548 A8,8 0 0 1 540,496 V232 A8,8 0 0 1 548,224 Z" />
      <path fill="#232323" d="M548,224 H740 A8,8 0 0 1 748,232 V266 A8,8 0 0 1 740,274 H548 A8,8 0 0 1 540,266 V232 A8,8 0 0 1 548,224 Z" />
      <text x="562" y="256" font-family="Consolas, Courier New, monospace" font-size="17" font-weight="800" fill="#FFFFFF">03</text>
      <text x="602" y="256" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">Agent 执行</text>
      <text x="564" y="310" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#1D1D1A">基础工程：</text>
      <text x="564" y="336" font-family="Consolas, Courier New, monospace" font-size="15" font-weight="700" fill="#C7000A">task/</text>
      <text x="564" y="378" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#1D1D1A">输入 prompt：</text>
      <text x="564" y="404" font-family="Consolas, Courier New, monospace" font-size="15" font-weight="700" fill="#C7000A">README.md</text>
      <line x1="564" y1="430" x2="724" y2="430" stroke="#EBEBEB" stroke-width="1" />
      <text x="564" y="462" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#666666">输出 Agent 修改：</text>
      <text x="564" y="486" font-family="Consolas, Courier New, monospace" font-size="15" font-weight="800" fill="#E9002F">implement_patch</text>
    </g>

    <g id="stage-4">
      <path fill="#FFFFFF" stroke="#EBEBEB" stroke-width="1.4" d="M788,224 H980 A8,8 0 0 1 988,232 V496 A8,8 0 0 1 980,504 H788 A8,8 0 0 1 780,496 V232 A8,8 0 0 1 788,224 Z" />
      <path fill="#C7000A" d="M788,224 H980 A8,8 0 0 1 988,232 V266 A8,8 0 0 1 980,274 H788 A8,8 0 0 1 780,266 V232 A8,8 0 0 1 788,224 Z" />
      <text x="802" y="256" font-family="Consolas, Courier New, monospace" font-size="17" font-weight="800" fill="#FFFFFF">04</text>
      <text x="842" y="256" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">结果验证</text>
      <text x="804" y="310" font-family="Consolas, Courier New, monospace" font-size="15" fill="#232323">task</text>
      <text x="804" y="334" font-family="Consolas, Courier New, monospace" font-size="15" fill="#232323">+ implement_patch</text>
      <text x="804" y="358" font-family="Consolas, Courier New, monospace" font-size="15" fill="#232323">+ test_patch</text>
      <line x1="804" y1="384" x2="964" y2="384" stroke="#EBEBEB" stroke-width="1" />
      
  <g transform="translate(804.0, 408.0) scale(0.9166666666666666)" fill="none" stroke="#2E7D32" stroke-width="2">
    <path d="M5 12l5 5l10 -10" />
  </g>
      <text x="836" y="425" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="700" fill="#2E7D32">同一测试集全通过</text>
      <text x="804" y="462" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#666666">判断 Agent 是否完成修复</text>
    </g>

    <g id="stage-5">
      <path fill="#FFFFFF" stroke="#EBEBEB" stroke-width="1.4" d="M1028,224 H1206 A8,8 0 0 1 1214,232 V496 A8,8 0 0 1 1206,504 H1028 A8,8 0 0 1 1020,496 V232 A8,8 0 0 1 1028,224 Z" />
      <path fill="#E9002F" d="M1028,224 H1206 A8,8 0 0 1 1214,232 V266 A8,8 0 0 1 1206,274 H1028 A8,8 0 0 1 1020,266 V232 A8,8 0 0 1 1028,224 Z" />
      <text x="1042" y="256" font-family="Consolas, Courier New, monospace" font-size="17" font-weight="800" fill="#FFFFFF">05</text>
      <text x="1082" y="256" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">实现审查</text>
      
  <g transform="translate(1044.0, 302.0) scale(1.0833333333333333)" fill="none" stroke="#E9002F" stroke-width="2">
    <path d="M4 6a2 2 0 1 0 4 0a2 2 0 1 0 -4 0" />
    <path d="M16 18a2 2 0 1 0 4 0a2 2 0 1 0 -4 0" />
    <path d="M11 6h5a2 2 0 0 1 2 2v8" />
    <path d="M14 9l-3 -3l3 -3" />
    <path d="M13 18h-5a2 2 0 0 1 -2 -2v-8" />
    <path d="M10 15l3 3l-3 3" />
  </g>
      <text x="1080" y="321" font-family="Consolas, Courier New, monospace" font-size="15" font-weight="800" fill="#232323">implement</text>
      <text x="1080" y="345" font-family="Consolas, Courier New, monospace" font-size="15" font-weight="800" fill="#232323">vs golden</text>
      <line x1="1044" y1="370" x2="1190" y2="370" stroke="#EBEBEB" stroke-width="1" />
      <text x="1044" y="402" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1D1D1A">断点体系</text>
      <text x="1044" y="428" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1D1D1A">Grid 属性驱动</text>
      <text x="1044" y="454" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1D1D1A">原功能保持</text>
      <text x="1044" y="480" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1D1D1A">无绕过测试</text>
    </g>
  </g>

  <g id="bottom-summary">
    <path fill="#F7F7F7" stroke="#EBEBEB" stroke-width="1.3" d="M68,546 H1206 A8,8 0 0 1 1214,554 V638 A8,8 0 0 1 1206,646 H68 A8,8 0 0 1 60,638 V554 A8,8 0 0 1 68,546 Z" />
    <text x="86" y="581" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" font-weight="800" fill="#232323">闭环的两个判定标准</text>
    <circle cx="104" cy="614" r="6" fill="#C7000A" />
    <text x="122" y="608" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#1D1D1A">测试判定：同一 test_patch 下，Golden 与 Agent 产物都应全部通过，</text>
    <text x="122" y="630" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#1D1D1A">Baseline 应暴露 fail_to_pass。</text>
    <circle cx="694" cy="614" r="6" fill="#E9002F" />
    <text x="712" y="608" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#1D1D1A">实现判定：不仅看测试绿灯，也看 implement_patch 是否采用</text>
    <text x="712" y="630" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#1D1D1A">符合预期的响应式 Grid 实现。</text>
  </g>

  <g id="footer">
    <text x="60" y="694" font-family="Consolas, Courier New, monospace" font-size="13" fill="#898989">Pipeline: golden → baseline → agent patch → tests → review</text>
    <text x="1214" y="694" text-anchor="end" font-family="Consolas, Courier New, monospace" font-size="13" fill="#898989">02 / 02</text>
  </g>
</svg>