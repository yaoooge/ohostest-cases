<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <marker id="arrowPrimary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#C7000A"/>
    </marker>
  </defs>

  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>
    <rect x="0" y="0" width="1280" height="116" fill="#F7F7F7"/>
    <rect x="0" y="0" width="9" height="720" fill="#C7000A"/>
  </g>

  <g id="header">
    <rect x="54" y="42" width="8" height="44" rx="4" fill="#C7000A"/>
    <text x="78" y="70" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="38" font-weight="800" fill="#1D1D1A">Grid case 把多设备适配压缩成一道可验证 SWE 题</text>
    <text x="80" y="99" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#666666">ResponsiveGridLayout / CaseResponsiveRepeatGridLayout · derive_base · HarmonyOS 一多 Grid 重复布局</text>
    <rect x="1018" y="44" width="196" height="38" rx="8" fill="#FFFFFF" stroke="#EBEBEB" stroke-width="1.5"/>
    <use data-icon="tabler-outline/layout-grid" x="1034" y="53" width="20" height="20" fill="#C7000A" stroke-width="2"/>
    <text x="1062" y="68" font-family="Consolas, Courier New, monospace" font-size="15" font-weight="700" fill="#232323">responsive-grid-layout</text>
  </g>

  <g id="asset-stack">
    <text x="60" y="156" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="24" font-weight="800" fill="#232323">题目资产</text>
    <text x="60" y="182" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#666666">目录内已经包含从基础工程到测试定义的完整材料</text>

    <rect x="60" y="204" width="378" height="320" rx="8" fill="#FFFFFF" stroke="#EBEBEB" stroke-width="1.5"/>
    <rect x="60" y="204" width="378" height="44" rx="8" fill="#C7000A"/>
    <text x="82" y="233" font-family="Consolas, Courier New, monospace" font-size="16" font-weight="700" fill="#FFFFFF">CaseResponsiveRepeatGridLayout/</text>

    <g id="asset-row-task">
      <use data-icon="tabler-outline/file-code" x="84" y="270" width="22" height="22" fill="#C7000A" stroke-width="2"/>
      <text x="116" y="287" font-family="Consolas, Courier New, monospace" font-size="16" font-weight="700" fill="#1D1D1A">task/</text>
      <text x="190" y="287" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#666666">待适配的基础工程</text>
      <line x1="82" y1="306" x2="416" y2="306" stroke="#EBEBEB" stroke-width="1"/>
    </g>
    <g id="asset-row-readme">
      <use data-icon="tabler-outline/file-code" x="84" y="326" width="22" height="22" fill="#C7000A" stroke-width="2"/>
      <text x="116" y="343" font-family="Consolas, Courier New, monospace" font-size="16" font-weight="700" fill="#1D1D1A">README.md</text>
      <text x="230" y="343" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#666666">题目 prompt</text>
      <line x1="82" y1="362" x2="416" y2="362" stroke="#EBEBEB" stroke-width="1"/>
    </g>
    <g id="asset-row-golden">
      <use data-icon="tabler-outline/file-code" x="84" y="382" width="22" height="22" fill="#C7000A" stroke-width="2"/>
      <text x="116" y="399" font-family="Consolas, Courier New, monospace" font-size="16" font-weight="700" fill="#1D1D1A">golden_patch.patch</text>
      <text x="286" y="399" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#666666">参考实现</text>
      <line x1="82" y1="418" x2="416" y2="418" stroke="#EBEBEB" stroke-width="1"/>
    </g>
    <g id="asset-row-test">
      <use data-icon="tabler-outline/file-code" x="84" y="438" width="22" height="22" fill="#C7000A" stroke-width="2"/>
      <text x="116" y="455" font-family="Consolas, Courier New, monospace" font-size="16" font-weight="700" fill="#1D1D1A">test_patch.patch</text>
      <text x="262" y="455" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#666666">评测测试</text>
      <line x1="82" y1="474" x2="416" y2="474" stroke="#EBEBEB" stroke-width="1"/>
    </g>
    <g id="asset-row-meta">
      <use data-icon="tabler-outline/file-code" x="84" y="494" width="22" height="22" fill="#C7000A" stroke-width="2"/>
      <text x="116" y="511" font-family="Consolas, Courier New, monospace" font-size="16" font-weight="700" fill="#1D1D1A">metadata.json</text>
      <text x="246" y="511" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#666666">测试分组定义</text>
    </g>
  </g>

  <g id="target-matrix">
    <text x="484" y="156" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="24" font-weight="800" fill="#232323">断点目标矩阵</text>
    <text x="484" y="182" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#666666">Agent 要把固定 2 列 Grid 改成断点驱动的重复布局</text>

    <rect x="484" y="204" width="730" height="320" rx="8" fill="#FFFFFF" stroke="#EBEBEB" stroke-width="1.5"/>
    <rect x="484" y="204" width="730" height="50" rx="8" fill="#232323"/>
    <text x="538" y="235" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="800" fill="#FFFFFF">断点</text>
    <text x="714" y="235" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="800" fill="#FFFFFF">Grid 列数</text>
    <text x="898" y="235" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="800" fill="#FFFFFF">间距</text>
    <text x="1060" y="235" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="800" fill="#FFFFFF">图片尺寸</text>

    <line x1="650" y1="254" x2="650" y2="524" stroke="#EBEBEB" stroke-width="1.5"/>
    <line x1="840" y1="254" x2="840" y2="524" stroke="#EBEBEB" stroke-width="1.5"/>
    <line x1="1008" y1="254" x2="1008" y2="524" stroke="#EBEBEB" stroke-width="1.5"/>

    <rect x="484" y="254" width="730" height="90" fill="#FFFFFF"/>
    <rect x="504" y="279" width="68" height="36" rx="18" fill="#F7F7F7" stroke="#B5B5B5" stroke-width="1"/>
    <text x="538" y="303" text-anchor="middle" font-family="Consolas, Courier New, monospace" font-size="17" font-weight="800" fill="#232323">SM</text>
    <text x="746" y="306" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="28" font-weight="800" fill="#1D1D1A">2 列</text>
    <text x="924" y="306" text-anchor="middle" font-family="Consolas, Courier New, monospace" font-size="24" font-weight="800" fill="#1D1D1A">8vp</text>
    <text x="1106" y="306" text-anchor="middle" font-family="Consolas, Courier New, monospace" font-size="24" font-weight="800" fill="#1D1D1A">58vp</text>

    <line x1="484" y1="344" x2="1214" y2="344" stroke="#EBEBEB" stroke-width="1.5"/>
    <rect x="484" y="344" width="730" height="90" fill="#FFF7F4"/>
    <rect x="504" y="369" width="68" height="36" rx="18" fill="#F26B43"/>
    <text x="538" y="393" text-anchor="middle" font-family="Consolas, Courier New, monospace" font-size="17" font-weight="800" fill="#FFFFFF">MD</text>
    <text x="746" y="396" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="28" font-weight="800" fill="#C7000A">3 列</text>
    <text x="924" y="396" text-anchor="middle" font-family="Consolas, Courier New, monospace" font-size="24" font-weight="800" fill="#C7000A">12vp</text>
    <text x="1106" y="396" text-anchor="middle" font-family="Consolas, Courier New, monospace" font-size="24" font-weight="800" fill="#C7000A">68vp</text>

    <line x1="484" y1="434" x2="1214" y2="434" stroke="#EBEBEB" stroke-width="1.5"/>
    <rect x="484" y="434" width="730" height="90" fill="#FFF4F5"/>
    <rect x="504" y="459" width="68" height="36" rx="18" fill="#E9002F"/>
    <text x="538" y="483" text-anchor="middle" font-family="Consolas, Courier New, monospace" font-size="17" font-weight="800" fill="#FFFFFF">LG</text>
    <text x="746" y="486" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="28" font-weight="800" fill="#E9002F">5 列</text>
    <text x="924" y="486" text-anchor="middle" font-family="Consolas, Courier New, monospace" font-size="24" font-weight="800" fill="#E9002F">16vp</text>
    <text x="1106" y="486" text-anchor="middle" font-family="Consolas, Courier New, monospace" font-size="24" font-weight="800" fill="#E9002F">76vp</text>
  </g>

  <g id="test-coverage">
    <text x="60" y="568" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="22" font-weight="800" fill="#232323">测试把“修复点”和“回归保护”分开定义</text>
    <rect x="60" y="590" width="555" height="70" rx="8" fill="#FFF4F5" stroke="#E9002F" stroke-width="1.5"/>
    <use data-icon="tabler-outline/alert-triangle" x="84" y="611" width="25" height="25" fill="#E9002F" stroke-width="2"/>
    <text x="122" y="620" font-family="Consolas, Courier New, monospace" font-size="17" font-weight="800" fill="#E9002F">fail_to_pass</text>
    <text x="122" y="645" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#1D1D1A">MD/LG 下列数、间距、图片尺寸必须从失败变为通过</text>

    <rect x="650" y="590" width="564" height="70" rx="8" fill="#F4FBF5" stroke="#2E7D32" stroke-width="1.5"/>
    <use data-icon="tabler-outline/check" x="674" y="611" width="25" height="25" fill="#2E7D32" stroke-width="2"/>
    <text x="712" y="620" font-family="Consolas, Courier New, monospace" font-size="17" font-weight="800" fill="#2E7D32">pass_to_pass</text>
    <text x="712" y="645" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#1D1D1A">页面启动、内容展示、SM 原行为、无横向溢出必须保持成功</text>
  </g>

  <g id="footer">
    <text x="60" y="694" font-family="Consolas, Courier New, monospace" font-size="13" fill="#898989">Source: README.md / metadata.json / golden_patch.patch / test_patch.patch</text>
    <text x="1214" y="694" text-anchor="end" font-family="Consolas, Courier New, monospace" font-size="13" fill="#898989">01 / 02</text>
  </g>
</svg>
